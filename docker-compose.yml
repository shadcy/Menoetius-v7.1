version: '3'

services:
  menoctius:
    build: .
    container_name: menoctius
    privileged: true
    network_mode: host
    environment:
      - DISPLAY=${DISPLAY}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /etc/localtime:/etc/localtime:ro
      - /etc/machine-id:/etc/machine-id:ro
    devices:
      - /dev/snd
      - /dev/dri
      - /dev/video0
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN
      - SYS_PTRACE
      - SYS_MODULE
    security_opt:
      - apparmor:unconfined
    tty: true
    stdin_open: true
    command: /bin/bash
